services:
  postgres:
    image: postgres:16-alpine
    container_name: kc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: ${KC_IMAGE:-ghcr.io/hiway-media/keycloak-apple-identity-provider-fitp-enricher}:${KC_IMAGE_TAG:-latest}
    container_name: kc-server
    depends_on:
      postgres:
        condition: service_healthy
    command: ["start-dev"]
    environment:
      # Admin bootstrap (Keycloak 26+ uses KC_BOOTSTRAP_*; older still accept KEYCLOAK_ADMIN_*)
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # DB
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
      # Features (already baked into image, but explicit doesn't hurt)
      KC_FEATURES: token-exchange
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-info}
    ports:
      - "${KC_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Servizio one-shot che verifica che apple-identity-provider e fitp-enricher
  # siano effettivamente registrati come SPI in Keycloak.
  # Avvio: `docker compose --profile verify run --rm verify`
  verify:
    image: curlimages/curl:8.10.1
    container_name: kc-verify
    profiles: ["verify"]
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KC_URL: http://keycloak:8080
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> token admin"
        TOKEN=$$(curl -sf -X POST "$$KC_URL/realms/master/protocol/openid-connect/token" \
          -d "client_id=admin-cli" -d "username=$$KC_ADMIN_USER" \
          -d "password=$$KC_ADMIN_PASSWORD" -d "grant_type=password" \
          | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
        [ -n "$$TOKEN" ] || { echo "FAIL: no admin token"; exit 1; }
        echo "==> serverinfo"
        INFO=$$(curl -sf -H "Authorization: Bearer $$TOKEN" "$$KC_URL/admin/serverinfo")
        echo "$$INFO" | grep -q '"apple"'         || { echo "FAIL: apple IdP not registered"; exit 1; }
        echo "  [OK] identity provider 'apple'"
        echo "$$INFO" | grep -q '"fitp-enricher"' || { echo "FAIL: fitp-enricher not registered"; exit 1; }
        echo "  [OK] authenticator 'fitp-enricher'"
        echo "==> all providers verified"

volumes:
  postgres-data:
